<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Bridge</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        /* Style the EO form to be dark-mode friendly */
        .email-octopus-form-wrapper {
            width: 100% !important;
            max-width: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
            background: transparent !important;
        }
        /* Ensure the form doesn't have a white background */
        iframe, form, .email-octopus-form {
            background: transparent !important;
        }
    </style>
</head>
<body>
    <div id="form-container"></div>
    
    <script>
        // Get the form ID from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const formId = urlParams.get('id');

        if (formId) {
            const container = document.getElementById('form-container');
            container.className = `email-octopus-form-${formId}`;
            container.setAttribute('data-form', formId);

            // Load official EO script
            const script = document.createElement('script');
            script.async = true;
            script.src = `https://eomail5.com/form/${formId}.js`;
            script.setAttribute('data-form', formId);
            document.body.appendChild(script);

            // Listen for success message from EO script
            // and notify the parent (React) to show the calendar links
            const observer = new MutationObserver(() => {
                const successMsg = document.querySelector('.email-octopus-success-message');
                if (successMsg && successMsg.innerHTML.trim() !== '') {
                    window.parent.postMessage({ type: 'registration-success', formId: formId }, '*');
                }
            });

            observer.observe(document.body, { childList: true, subtree: true });
        }
    </script>
</body>
</html>
